name: Update ETF Yields

on:
  schedule:
    # Runs at 9:00am ET (13:30 UTC) Monday-Friday — start of each market day
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

jobs:
  update-yields:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch ETF yields
        run: python scripts/fetch_yields.py

      - name: Commit and push yields file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf_yields.json
          git diff --staged --quiet || git commit -m "Auto-update ETF yields $(date +'%Y-%m-%d')"
          git push